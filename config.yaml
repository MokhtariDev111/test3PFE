# ============================================================
# Real-Time AI Teaching Assistant — Central Configuration
# ============================================================

project:
  name: "AI Teaching Assistant"
  version: "1.0.0"
  description: "Automatic PowerPoint generation using RAG"

# Paths
paths:
  data_raw:       "data/raw"          # Drop your PDFs / images here
  data_processed: "data/processed"   # Cleaned & chunked text
  data_output:    "data/output"      # Generated slides / PPTX
  logs:           "logs"
  outputs:        "outputs"

# Virtual environment (managed automatically, path removed here)

# ---- Step-specific settings (filled in as we progress) ----

# Step 3 — OCR
ocr:
  engine: "easyocr"          # "easyocr" | "tesseract"
  languages: ["fr", "en"]

# Step 4 — Text Processing
text_processing:
  chunk_size: 512
  chunk_overlap: 64

# Step 5 — Embeddings
embeddings:
  model: "BAAI/bge-small-en-v1.5"   # small + fast, good quality
  device: "cuda"                     # Tries CUDA first, falls back to CPU automatically

# Step 5 — Vector DB
vector_db:
  backend: "faiss"                  # "faiss" | "chroma"
  index_path: "data/processed/faiss_index"

# Step 7 — LLM  (Ollama Backend)
llm:
  backend: "ollama"            
  api_url: "http://localhost:11434/api/generate"
  
  # Change this to whatever you specifically have installed via Ollama
  # Examples: "mistral", "llama3.2", "qwen2.5"
  model: "mistral"
  
  # Generation parameters
  temperature: 0.3
  context_length: 4096

# Step 11 — Streamlit
streamlit:
  port: 8501
  title: "AI Teaching Assistant"
